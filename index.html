
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1a2a4a; --navy2: #2a3f6f; --gold: #b8860b;
  --bg: #f0f2f5; --card: #ffffff; --border: rgba(26,42,74,0.18);
  --text: #1a2a4a; --muted: #4a5a7a;
  --transit-color: #c0392b;
}
.app { background: #f0f2f5; padding: 1.5rem; border-radius: 12px; font-family: Georgia, serif; color: var(--text); }
.header { text-align: center; margin-bottom: 1.2rem; }
.header h1 { font-size: 1.7rem; font-weight: 400; letter-spacing: 0.3em; color: var(--navy); }
.header p { font-size: 10px; letter-spacing: 0.2em; color: var(--muted); margin-top: 3px; font-family: sans-serif; text-transform: uppercase; }
.divider { display: flex; align-items: center; gap: 10px; margin: 0.8rem 0; }
.divider-line { flex: 1; height: 1px; background: rgba(26,42,74,0.15); }
.divider-gem { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 10px; letter-spacing: 0.15em; color: var(--navy); font-family: sans-serif; text-transform: uppercase; font-weight: 700; }
.form-input { background: #fff; border: 1.5px solid rgba(26,42,74,0.3); border-radius: 6px; color: var(--navy); font-size: 13px; padding: 9px 11px; outline: none; width: 100%; font-family: sans-serif; }
.form-input:focus { border-color: var(--navy2); box-shadow: 0 0 0 3px rgba(26,42,74,0.08); }
.gen-btn { display: block; width: 100%; padding: 14px; background: var(--navy); border: none; border-radius: 6px; color: #fff; font-family: sans-serif; font-size: 12px; font-weight: bold; letter-spacing: 0.2em; cursor: pointer; text-transform: uppercase; box-shadow: 0 3px 12px rgba(26,42,74,0.25); }
.gen-btn:hover { background: var(--navy2); }
.results { display: none; margin-top: 1.2rem; }
.tabs { display: flex; border-bottom: 2px solid rgba(26,42,74,0.15); margin-bottom: 1rem; flex-wrap: wrap; background: #fff; border-radius: 8px 8px 0 0; padding: 0 4px; }
.tab-btn { background: transparent; border: none; border-bottom: 2.5px solid transparent; color: var(--muted); cursor: pointer; font-family: sans-serif; font-size: 10px; letter-spacing: 0.13em; margin-bottom: -2px; padding: 10px 11px; text-transform: uppercase; }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 700; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* トランジット日付コントロール */
.transit-ctrl {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: #fff; border: 1.5px solid rgba(26,42,74,0.15);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(26,42,74,0.07);
}
.transit-ctrl-label { font-size: 10px; color: var(--navy); font-family: sans-serif; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
.transit-date-input { background: #f5f6fa; border: 1.5px solid rgba(26,42,74,0.25); border-radius: 5px; color: var(--navy); font-size: 12px; padding: 6px 10px; font-family: sans-serif; outline: none; }
.transit-date-input:focus { border-color: var(--navy2); }
.today-btn { background: var(--navy); border: none; border-radius: 4px; color: #fff; cursor: pointer; font-family: sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 6px 12px; text-transform: uppercase; white-space: nowrap; }
.today-btn:hover { background: var(--navy2); }
.legend { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-family: sans-serif; font-size: 10px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.chart-wrap { display: flex; justify-content: center; padding: 0.5rem 0; }
.chart-actions { display: flex; justify-content: center; gap: 8px; margin-bottom: 0.8rem; }
.action-btn { background: #fff; border: 1.5px solid rgba(26,42,74,0.28); border-radius: 4px; color: var(--navy); cursor: pointer; font-family: sans-serif; font-size: 11px; letter-spacing: 0.08em; padding: 7px 14px; }
.action-btn:hover { background: #e8eaf0; }

.planet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 7px; }
.pcard { background: #fff; border: 1.5px solid rgba(26,42,74,0.1); border-radius: 8px; padding: 10px 12px; }
.pcard-name { font-size: 10px; letter-spacing: 0.13em; color: var(--gold); font-family: sans-serif; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
.pcard-pos { font-size: 14px; color: var(--navy); }
.pcard-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: sans-serif; }
.pcard.transit-card { border-color: rgba(192,57,43,0.3); }
.pcard.transit-card .pcard-name { color: var(--transit-color); }

.house-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.hitem { background: #fff; border: 1.5px solid rgba(26,42,74,0.1); border-radius: 6px; padding: 8px 10px; display: flex; align-items: center; gap: 7px; font-family: sans-serif; }
.hnum { font-size: 10px; color: var(--gold); min-width: 24px; font-weight: 700; }
.hsign { font-size: 14px; color: var(--navy); }
.hdeg { font-size: 11px; color: var(--muted); }

.asp-table { width: 100%; border-collapse: collapse; font-family: sans-serif; background: #fff; border-radius: 8px; overflow: hidden; }
.asp-table th { font-size: 9px; letter-spacing: 0.15em; color: var(--navy); background: #eef0f5; padding: 9px; text-align: left; font-weight: 700; border-bottom: 1px solid rgba(26,42,74,0.1); }
.asp-table td { font-size: 12px; padding: 7px 9px; border-bottom: 1px solid rgba(26,42,74,0.06); color: var(--text); }
.abadge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 600; }
.a-conj{background:rgba(184,134,11,0.15);color:#7a5800;} .a-trine{background:rgba(0,140,80,0.12);color:#005a30;} .a-sext{background:rgba(0,100,180,0.12);color:#004a90;} .a-sq{background:rgba(180,40,40,0.12);color:#8a0000;} .a-opp{background:rgba(160,80,0,0.12);color:#7a3800;}

.titem { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1.5px solid rgba(26,42,74,0.1); border-radius: 8px; margin-bottom: 6px; background: #fff; }
.titem-icon { width: 26px; height: 26px; border-radius: 50%; background: rgba(26,42,74,0.08); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.titem-main { font-size: 12px; color: var(--navy); font-weight: 500; font-family: sans-serif; }
.titem-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: sans-serif; }
.titem-orb { margin-left: auto; font-size: 10px; color: var(--gold); white-space: nowrap; font-family: sans-serif; font-weight: 700; }
.titem-interp { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: sans-serif; line-height: 1.55; }
.titem-score { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
.score-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); opacity: 0.18; flex-shrink: 0; }
.score-dot.filled { opacity: 1; }
.transit-top5 { background: linear-gradient(135deg, #1a2a4a 0%, #2a3f6f 100%); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.transit-top5-title { font-size: 10px; letter-spacing: 0.2em; color: #b8860b; font-family: sans-serif; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
.top5-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.top5-item:last-child { border-bottom: none; padding-bottom: 0; }
.top5-rank { min-width: 22px; height: 22px; border-radius: 50%; background: rgba(184,134,11,0.25); border: 1px solid #b8860b; color: #b8860b; font-size: 10px; font-weight: 700; font-family: sans-serif; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.top5-label { font-size: 11px; color: #fff; font-family: sans-serif; font-weight: 600; margin-bottom: 4px; }
.top5-interp { font-size: 11px; color: rgba(255,255,255,0.68); font-family: sans-serif; line-height: 1.55; }
.top5-orb { margin-left: auto; font-size: 10px; color: #b8860b; font-family: sans-serif; font-weight: 700; white-space: nowrap; flex-shrink: 0; padding-left: 8px; }
.row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
.sec-title { font-size: 10px; letter-spacing: 0.2em; color: var(--navy); font-family: sans-serif; text-transform: uppercase; font-weight: 700; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,20,50,0.72); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.modal-overlay.open { display: flex; }
.modal-box { background: #f5f6fa; border: 1.5px solid rgba(26,42,74,0.2); border-radius: 14px; padding: 1.2rem; max-width: 90vw; max-height: 88vh; overflow: auto; position: relative; }
.modal-close { position: absolute; top: 10px; right: 10px; background: rgba(26,42,74,0.1); border: 1.5px solid rgba(26,42,74,0.25); border-radius: 50%; color: var(--navy); cursor: pointer; font-size: 14px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
.modal-title { font-size: 11px; letter-spacing: 0.18em; color: var(--navy); font-family: sans-serif; text-transform: uppercase; margin-bottom: 0.8rem; font-weight: 700; }
.modal-dl-btn { background: var(--navy); border: none; border-radius: 6px; color: #fff; cursor: pointer; font-family: sans-serif; font-size: 11px; font-weight: bold; letter-spacing: 0.15em; padding: 10px 22px; text-transform: uppercase; }
/* === 日付ナビゲーション === */
.date-nav-group { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.nav-btn { background: rgba(26,42,74,0.08); border: 1.5px solid rgba(26,42,74,0.18); border-radius: 4px; color: var(--navy); cursor: pointer; font-family: sans-serif; font-size: 10px; font-weight: 700; padding: 5px 8px; white-space: nowrap; }
.nav-btn:hover { background: rgba(26,42,74,0.16); }
/* === 月間タイムライン === */
.timeline-month-input { background: #f5f6fa; border: 1.5px solid rgba(26,42,74,0.25); border-radius: 5px; color: var(--navy); font-size: 12px; padding: 6px 10px; font-family: sans-serif; outline: none; }
.tl-day { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid rgba(26,42,74,0.06); }
.tl-date { font-size: 11px; font-family: sans-serif; color: var(--navy); font-weight: 700; min-width: 42px; }
.tl-bar-wrap { flex: 1; height: 8px; background: rgba(26,42,74,0.07); border-radius: 4px; overflow: hidden; min-width: 60px; }
.tl-bar { height: 100%; border-radius: 4px; }
.tl-aspects { font-size: 9px; font-family: sans-serif; color: var(--muted); flex: 1.5; min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
/* === 日付比較 === */
.compare-ctrl { background: #fff; border: 1.5px solid rgba(26,42,74,0.1); border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.compare-date-block { display: flex; flex-direction: column; gap: 5px; }
.compare-date-label { font-size: 10px; font-family: sans-serif; font-weight: 700; letter-spacing: 0.1em; color: var(--navy); text-transform: uppercase; }
.compare-date-inputs { display: flex; gap: 6px; flex-wrap: wrap; }
.compare-btn { background: var(--navy); border: none; border-radius: 5px; color: #fff; cursor: pointer; font-family: sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; padding: 9px 18px; text-transform: uppercase; }
.compare-btn:hover { background: var(--navy2); }
.compare-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 520px) { .compare-panels { grid-template-columns: 1fr; } }
.compare-col { background: #fff; border: 1.5px solid rgba(26,42,74,0.12); border-radius: 8px; padding: 12px; }
.compare-col-a .compare-col-header { color: #1a2a4a; border-bottom: 2px solid #1a2a4a; }
.compare-col-b .compare-col-header { color: #c0392b; border-bottom: 2px solid #c0392b; }
.compare-col-header { font-size: 10px; font-family: sans-serif; font-weight: 700; margin-bottom: 8px; padding-bottom: 7px; letter-spacing: 0.12em; text-transform: uppercase; }
.compare-item { display: flex; gap: 7px; padding: 7px 0; border-bottom: 1px solid rgba(26,42,74,0.05); }
.compare-item:last-child { border-bottom: none; }
.ci-rank { min-width: 18px; height: 18px; border-radius: 50%; background: rgba(184,134,11,0.15); color: var(--gold); font-size: 9px; font-weight: 700; font-family: sans-serif; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ci-label { font-size: 11px; font-family: sans-serif; font-weight: 600; color: var(--navy); }
.ci-interp { font-size: 10px; font-family: sans-serif; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.ci-orb { font-size: 9px; color: var(--gold); font-family: sans-serif; font-weight: 700; margin-top: 2px; }
</style>

<div class="app">
  <div class="header">
    <h1>星読み</h1>
    <p>Natal Chart &amp; Transit Analysis</p>
  </div>
  <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>
  <div class="form-grid">
    <div class="form-group"><span class="form-label">生年月日</span><input class="form-input" type="date" id="birthDate" value="1990-01-01"></div>
    <div class="form-group"><span class="form-label">出生時刻</span><input class="form-input" type="time" id="birthTime" value="12:00"></div>
    <div class="form-group full"><span class="form-label">出生地（都市名）</span><input class="form-input" type="text" id="birthPlace" placeholder="例: Tokyo, Osaka, New York" value="Tokyo"></div>
    <div class="form-group full"><button class="gen-btn" id="genBtn">✦ チャートを生成する ✦</button></div>
  </div>

  <div class="results" id="results">
    <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>

    <!-- トランジット日付コントロール（常に表示） -->
    <div class="transit-ctrl">
      <span class="transit-ctrl-label">🔄 トランジット日</span>
      <div class="date-nav-group">
        <button class="nav-btn" id="navYearMinus">-1年</button>
        <button class="nav-btn" id="navMonthMinus">-1月</button>
        <button class="nav-btn" id="navWeekMinus">-1週</button>
        <button class="nav-btn" id="navDayMinus">-1日</button>
        <input class="transit-date-input" type="date" id="transitDate">
        <input class="transit-date-input" type="time" id="transitTime" value="12:00" style="width:100px">
        <button class="nav-btn" id="navDayPlus">+1日</button>
        <button class="nav-btn" id="navWeekPlus">+1週</button>
        <button class="nav-btn" id="navMonthPlus">+1月</button>
        <button class="nav-btn" id="navYearPlus">+1年</button>
        <button class="today-btn" id="todayBtn">今日</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a2a4a;border:2px solid #1a2a4a"></div><span>ネイタル</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#c0392b;border:2px solid #c0392b"></div><span>トランジット</span></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="chart">二重チャート</button>
      <button class="tab-btn" data-tab="planets">天体配置</button>
      <button class="tab-btn" data-tab="houses">ハウス</button>
      <button class="tab-btn" data-tab="aspects">アスペクト</button>
      <button class="tab-btn" data-tab="transits">トランジット一覧</button>
      <button class="tab-btn" data-tab="timeline">月間ライン</button>
      <button class="tab-btn" data-tab="compare">日付比較</button>
    </div>

    <div id="pane-chart" class="tab-pane active">
      <div class="chart-wrap"><canvas id="natalChart" width="320" height="320"></canvas></div>
      <div class="chart-actions">
        <button class="action-btn" id="expandBtn">⊹ 拡大して見る</button>
        <button class="action-btn" id="dlChartBtn">↓ チャートを保存</button>
      </div>
    </div>
    <div id="pane-planets" class="tab-pane">
      <div class="row-between"><p class="sec-title">天体配置</p><button class="action-btn" id="dlPlanetsBtn">↓ CSV保存</button></div>
      <p style="font-size:10px;font-family:sans-serif;color:var(--muted);margin-bottom:8px;">ネイタル（上）／トランジット（下・赤枠）</p>
      <div class="planet-grid" id="planetGrid"></div>
    </div>
    <div id="pane-houses" class="tab-pane">
      <div class="row-between"><p class="sec-title">ハウスカスプ（プラシダス）</p><button class="action-btn" id="dlHousesBtn">↓ CSV保存</button></div>
      <div class="house-grid" id="houseGrid"></div>
    </div>
    <div id="pane-aspects" class="tab-pane">
      <div class="row-between"><p class="sec-title">ネイタルアスペクト</p><button class="action-btn" id="dlAspectsBtn">↓ CSV保存</button></div>
      <table class="asp-table"><thead><tr><th>天体1</th><th>天体2</th><th>アスペクト</th><th>角度</th><th>オーブ</th></tr></thead><tbody id="aspectBody"></tbody></table>
    </div>
    <div id="pane-transits" class="tab-pane">
      <div class="row-between"><p class="sec-title">トランジットアスペクト</p><button class="action-btn" id="dlTransitsBtn">↓ CSV保存</button></div>
      <div id="transitList"></div>
    </div>

    <div id="pane-timeline" class="tab-pane">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
        <p class="sec-title">月間トランジット強度</p>
        <input class="timeline-month-input" type="month" id="timelineMonth">
        <button class="today-btn" id="timelineGenBtn" style="padding:6px 14px">表示</button>
      </div>
      <div id="timelineList"><p style="color:var(--muted);font-size:12px;font-family:sans-serif;padding:1rem">月を選んで「表示」を押してください</p></div>
    </div>

    <div id="pane-compare" class="tab-pane">
      <div class="compare-ctrl">
        <div class="compare-date-block">
          <span class="compare-date-label">📅 日付 A</span>
          <div class="compare-date-inputs">
            <input class="transit-date-input" type="date" id="compareDateA">
            <input class="transit-date-input" type="time" id="compareTimeA" value="12:00" style="width:100px">
          </div>
        </div>
        <div class="compare-date-block">
          <span class="compare-date-label">📅 日付 B</span>
          <div class="compare-date-inputs">
            <input class="transit-date-input" type="date" id="compareDateB">
            <input class="transit-date-input" type="time" id="compareTimeB" value="12:00" style="width:100px">
          </div>
        </div>
        <button class="compare-btn" id="compareBtn">✦ 比較する</button>
      </div>
      <div id="compareResult"><p style="color:var(--muted);font-size:12px;font-family:sans-serif;padding:0.5rem">日付A・Bを入力して「比較する」を押してください</p></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <p class="modal-title">二重チャート（拡大）</p>
    <canvas id="bigChart" width="520" height="520"></canvas>
  </div>
  <button class="modal-dl-btn" id="dlBigChartBtn">↓ ダウンロード</button>
</div>

<script>
const SIGNS=['牡羊座','牡牛座','双子座','蟹座','獅子座','乙女座','天秤座','蠍座','射手座','山羊座','水瓶座','魚座'];
const SSYM=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const PNAMES={Sun:'太陽',Moon:'月',Mercury:'水星',Venus:'金星',Mars:'火星',Jupiter:'木星',Saturn:'土星',Uranus:'天王星',Neptune:'海王星',Pluto:'冥王星'};
const PSYM={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆',Pluto:'♇'};
const NATAL_COL={Sun:'#b8860b',Moon:'#3a5080',Mercury:'#2a6040',Venus:'#8a3060',Mars:'#8a1a1a',Jupiter:'#6a4010',Saturn:'#4a4a20',Uranus:'#1a4a6a',Neptune:'#2a2a8a',Pluto:'#4a1a4a'};

function calcHouses(jd,lat,lon){const T=(jd-2451545)/36525,LST=((280.46061837+360.98564736629*(jd-2451545)+0.000387933*T*T)%360+360)%360,RAMC=((LST+lon)%360+360)%360,eps=(23.439291111-0.013004167*T)*Math.PI/180,latR=lat*Math.PI/180,R=RAMC*Math.PI/180;let mc=Math.atan2(Math.cos(R),-(Math.sin(R)*Math.cos(eps)+Math.tan(latR)*Math.sin(eps)))*180/Math.PI;if(Math.cos(R)<0)mc=(mc+180)%360;mc=(mc+360)%360;let asc=Math.atan2(Math.cos(R),-(Math.sin(eps)*Math.tan(latR)+Math.sin(R)*Math.cos(eps)))*180/Math.PI;asc=(asc+360)%360;const h=[asc];for(let i=1;i<12;i++){if(i===3)h.push((mc+180)%360);else if(i===6)h.push((asc+180)%360);else if(i===9)h.push(mc);else{const b=h[i<3?0:i<6?3:i<9?6:9];h.push((b+(i%3)*30)%360);}}return h;}

// 重要度スコア計算
const T_WEIGHT={Pluto:5,Neptune:5,Uranus:5,Saturn:4,Jupiter:3,Mars:2,Sun:2,Moon:2,Venus:1,Mercury:1};
const N_WEIGHT={Sun:5,Moon:5,Mars:2,Venus:2,Mercury:1,Jupiter:2,Saturn:2,Uranus:2,Neptune:2,Pluto:2};
const ASP_WEIGHT={conj:5,opp:4,sq:4,trine:3,sext:2};

function calcTransitScore(tpl,npl,asp,orbN){
  const tw=T_WEIGHT[tpl]||1,nw=N_WEIGHT[npl]||1,aw=ASP_WEIGHT[asp.cls]||1;
  const orbFactor=Math.max(0.15,1-orbN/10);
  return Math.round((tw+nw)*aw*orbFactor*10);
}

function getTransitInterp(tpl,npl,asp){
  const c=asp.cls;
  const k1=`${tpl}_${c}_${npl}`,k2=`${tpl}_${c}`;
  if(TRANSIT_INTERP[k1])return TRANSIT_INTERP[k1];
  if(TRANSIT_INTERP_FB[k2])return TRANSIT_INTERP_FB[k2];
  const aspLabel={conj:'エネルギーが一体化し',trine:'調和的な流れが生まれ',sext:'穏やかな機会が訪れ',sq:'緊張と成長の機会が生まれ',opp:'対立と統合のテーマが現れ'};
  return `${PNAMES[tpl]}が${PNAMES[npl]}に${asp.name}を形成しています。${aspLabel[c]||'影響が生まれ'}、この天体に関わる領域に変化が出やすい時期です。`;
}

function getTransitJD(){
  const ds=document.getElementById('transitDate').value,ts=document.getElementById('transitTime').value;
  if(!ds||!ts)return null;
  const[y,mo,d]=ds.split('-').map(Number),[h,mi]=ts.split(':').map(Number);
  return toJD(y,mo,d,h,mi,9);
}

function drawChart(canvas,pos,houses,todayPos,size){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,sc=size/320;
  ctx.clearRect(0,0,W,H);

  // 外側円（トランジットリング）
  ctx.fillStyle='#fdf5f5';
  ctx.beginPath();ctx.arc(cx,cy,cx-2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(192,57,43,0.3)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,cx-2,0,Math.PI*2);ctx.stroke();

  const TOR=cx-4;       // トランジット外縁
  const TIR=cx-28*sc;   // トランジット内縁 = サイン外縁
  const OR=TIR;
  const SR=cx-50*sc;    // サイン内縁
  const HR=cx-66*sc;    // ハウス番号内縁
  const PR=cx-82*sc;    // 惑星リング（ネイタル）
  const innerR=PR-12*sc;

  // トランジットリング背景
  ctx.fillStyle='rgba(255,240,240,0.6)';
  ctx.beginPath();ctx.arc(cx,cy,TOR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f5f6fa';
  ctx.beginPath();ctx.arc(cx,cy,TIR,0,Math.PI*2);ctx.fill();

  // トランジット天体（外リング）
  if(todayPos){
    PLANETS.forEach(p=>{
      const deg=((todayPos[p]-houses[0]+360)%360),a=(deg-90)*Math.PI/180;
      const r=(TOR+TIR)/2;
      const px2=cx+r*Math.cos(a),py2=cy+r*Math.sin(a);
      ctx.fillStyle='rgba(255,255,255,0.95)';
      ctx.beginPath();ctx.arc(px2,py2,8*sc,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=TRANSIT_COL;ctx.lineWidth=1.2*sc;
      ctx.beginPath();ctx.arc(px2,py2,8*sc,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=TRANSIT_COL;ctx.font=`bold ${9*sc}px serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(PSYM[p],px2,py2);
    });

    // トランジット→ネイタルアスペクトライン（内側に引く）
    const ac={conj:'rgba(192,57,43,0.5)',trine:'rgba(0,140,80,0.45)',sext:'rgba(0,100,180,0.4)',sq:'rgba(180,40,40,0.45)',opp:'rgba(160,80,0,0.45)'};
    PLANETS.forEach(tp=>{
      PLANETS.forEach(np=>{
        const asp=getAspect(todayPos[tp],pos[np]);
        if(asp){
          const ta=((todayPos[tp]-houses[0]+360)%360-90)*Math.PI/180;
          const na=((pos[np]-houses[0]+360)%360-90)*Math.PI/180;
          const tr=(TOR+TIR)/2, nr=(HR+innerR)/2;
          ctx.strokeStyle=ac[asp.cls]||'rgba(0,0,0,0.15)';
          ctx.lineWidth=0.7;
          ctx.setLineDash([3,3]);
          ctx.beginPath();
          ctx.moveTo(cx+tr*Math.cos(ta),cy+tr*Math.sin(ta));
          ctx.lineTo(cx+nr*Math.cos(na),cy+nr*Math.sin(na));
          ctx.stroke();
          ctx.setLineDash([]);
        }
      });
    });
  }

  // サインセクター
  const signColors=['#fff8f0','#f0fff4','#f0f4ff','#fff0f8','#fffaf0','#f4fff0','#f0f8ff','#fff0f0','#f5f0ff','#f0fbff','#f8f5ff','#fff0fc'];
  for(let i=0;i<12;i++){
    const sa=((-houses[0]+i*30-90)*Math.PI/180),ea=((-houses[0]+(i+1)*30-90)*Math.PI/180);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,OR,sa,ea);ctx.closePath();
    ctx.fillStyle=signColors[i];ctx.fill();
    ctx.strokeStyle='rgba(26,42,74,0.1)';ctx.lineWidth=0.5;ctx.stroke();
    const ma=(sa+ea)/2;
    ctx.fillStyle='#1a2a4a';ctx.font=`${10*sc}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(SSYM[i],cx+(OR+SR)/2*Math.cos(ma),cy+(OR+SR)/2*Math.sin(ma));
  }

  ctx.strokeStyle='rgba(26,42,74,0.2)';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.arc(cx,cy,SR,0,Math.PI*2);ctx.stroke();

  // ハウス番号リング
  ctx.fillStyle='rgba(238,240,245,0.95)';
  ctx.beginPath();ctx.arc(cx,cy,SR,0,Math.PI*2);ctx.fill();

  for(let i=0;i<12;i++){
    const a=((houses[i]-houses[0]-90)*Math.PI/180);
    const isAngle=i===0||i===3||i===6||i===9;
    ctx.strokeStyle=isAngle?'rgba(26,42,74,0.7)':'rgba(26,42,74,0.28)';
    ctx.lineWidth=isAngle?1.3*sc:0.7;
    ctx.beginPath();ctx.moveTo(cx+HR*Math.cos(a),cy+HR*Math.sin(a));
    ctx.lineTo(cx+OR*Math.cos(a),cy+OR*Math.sin(a));ctx.stroke();

    const next=houses[(i+1)%12];
    let mid=(houses[i]+next)/2;
    if(next<houses[i])mid=(houses[i]+next+360)/2;
    mid=mid%360;
    const midA=((mid-houses[0]-90)*Math.PI/180);
    const labelR=(SR+HR)/2;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(cx+labelR*Math.cos(midA),cy+labelR*Math.sin(midA),7.5*sc,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(26,42,74,0.15)';ctx.lineWidth=0.5;ctx.stroke();
    ctx.fillStyle='#1a2a4a';ctx.font=`bold ${8.5*sc}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(i+1),cx+labelR*Math.cos(midA),cy+labelR*Math.sin(midA));
  }

  // ASC強調
  ctx.strokeStyle='rgba(26,42,74,0.9)';ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(cx+HR*Math.cos(-Math.PI/2),cy+HR*Math.sin(-Math.PI/2));
  ctx.lineTo(cx+OR*Math.cos(-Math.PI/2),cy+OR*Math.sin(-Math.PI/2));ctx.stroke();

  ctx.strokeStyle='rgba(26,42,74,0.18)';ctx.lineWidth=0.7;
  [HR,innerR].forEach(r=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();});

  // 惑星リング白
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx,cy,HR,0,Math.PI*2);ctx.fill();

  // 内側塗り
  ctx.fillStyle='#f9fafb';
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.fill();

  // ネイタルアスペクトライン
  const pk=PLANETS.slice(0,7);
  const pa=pk.map(p=>{const deg=((pos[p]-houses[0]+360)%360);return(deg-90)*Math.PI/180;});
  const pp=pk.map((_,i)=>({x:cx+(innerR-9*sc)*Math.cos(pa[i]),y:cy+(innerR-9*sc)*Math.sin(pa[i])}));
  const nac={conj:'rgba(184,134,11,0.5)',trine:'rgba(0,140,80,0.45)',sext:'rgba(0,100,180,0.4)',sq:'rgba(180,40,40,0.45)',opp:'rgba(160,80,0,0.45)'};
  ctx.lineWidth=0.7;
  for(let i=0;i<pk.length;i++)for(let j=i+1;j<pk.length;j++){
    const asp=getAspect(pos[pk[i]],pos[pk[j]]);
    if(asp){ctx.strokeStyle=nac[asp.cls]||'rgba(0,0,0,0.1)';ctx.beginPath();ctx.moveTo(pp[i].x,pp[i].y);ctx.lineTo(pp[j].x,pp[j].y);ctx.stroke();}
  }

  // ネイタル惑星
  PLANETS.forEach(p=>{
    const deg=((pos[p]-houses[0]+360)%360),a=(deg-90)*Math.PI/180;
    const r=(HR+innerR)/2;
    const px2=cx+r*Math.cos(a),py2=cy+r*Math.sin(a);
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.beginPath();ctx.arc(px2,py2,8*sc,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=NATAL_COL[p];ctx.lineWidth=1.2*sc;
    ctx.beginPath();ctx.arc(px2,py2,8*sc,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=NATAL_COL[p];ctx.font=`bold ${10*sc}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(PSYM[p],px2,py2);
  });
}

function calculate(){
  const dateStr=document.getElementById('birthDate').value,timeStr=document.getElementById('birthTime').value,place=document.getElementById('birthPlace').value;
  if(!dateStr||!timeStr)return;
  const[y,mo,d]=dateStr.split('-').map(Number),[h,mi]=timeStr.split(':').map(Number);
  const[lat,lon]=getCoords(place),tz=Math.round(lon/15),jd=toJD(y,mo,d,h,mi,tz);
  const pos={};PLANETS.forEach(p=>pos[p]=calcPlanet(p,jd));
  const houses=calcHouses(jd,lat,lon);
  CD={pos,houses,birthDate:dateStr,birthPlace:place};
  document.getElementById('results').style.display='block';
  renderAll();
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function getTodayPos(){
  const jd=getTransitJD();
  if(!jd)return null;
  const p={};PLANETS.forEach(pl=>p[pl]=calcPlanet(pl,jd));
  return p;
}

function renderAll(){
  const tp=getTodayPos();
  drawChart(document.getElementById('natalChart'),CD.pos,CD.houses,tp,320);
  renderPlanets(tp);renderHouses();renderAspects();renderTransits(tp);
}

function renderPlanets(tp){
  const{pos,houses}=CD;
  let html='';
  PLANETS.forEach(p=>{
    const s=degToSDD(pos[p]),h=planetHouse(pos[p],houses);
    html+=`<div class="pcard"><div class="pcard-name">${PSYM[p]} ${PNAMES[p]}</div><div class="pcard-pos">${SIGNS[s.si]} ${s.d}°${String(s.m).padStart(2,'0')}'</div><div class="pcard-sub">第${h}ハウス</div></div>`;
  });
  if(tp){
    html+='<div style="grid-column:1/-1;font-size:10px;font-family:sans-serif;color:#c0392b;font-weight:700;letter-spacing:0.1em;margin-top:4px;padding-top:8px;border-top:1px solid rgba(192,57,43,0.2);">— トランジット天体 —</div>';
    PLANETS.forEach(p=>{
      const s=degToSDD(tp[p]),h=planetHouse(tp[p],CD.houses);
      html+=`<div class="pcard transit-card"><div class="pcard-name">${PSYM[p]} ${PNAMES[p]}</div><div class="pcard-pos">${SIGNS[s.si]} ${s.d}°${String(s.m).padStart(2,'0')}'</div><div class="pcard-sub">第${h}ハウス</div></div>`;
    });
  }
  document.getElementById('planetGrid').innerHTML=html;
}

function renderHouses(){document.getElementById('houseGrid').innerHTML=CD.houses.map((h,i)=>{const s=degToSDD(h);return`<div class="hitem"><span class="hnum">H${i+1}</span><span class="hsign">${SSYM[s.si]}</span><span class="hdeg">${SIGNS[s.si].slice(0,-1)} ${s.d}°${String(s.m).padStart(2,'0')}'</span></div>`;}).join('');}

function renderAspects(){const{pos}=CD;let rows='';for(let i=0;i<PLANETS.length;i++)for(let j=i+1;j<PLANETS.length;j++){const asp=getAspect(pos[PLANETS[i]],pos[PLANETS[j]]);if(asp)rows+=`<tr><td>${PSYM[PLANETS[i]]} ${PNAMES[PLANETS[i]]}</td><td>${PSYM[PLANETS[j]]} ${PNAMES[PLANETS[j]]}</td><td><span class="abadge a-${asp.cls}">${asp.sym} ${asp.name}</span></td><td>${asp.ang}°</td><td style="color:var(--muted)">${asp.orb}°</td></tr>`;}document.getElementById('aspectBody').innerHTML=rows||'<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1rem">なし</td></tr>';}

function renderTransits(tp){
  if(!tp){document.getElementById('transitList').innerHTML='<p style="color:var(--muted);font-size:12px;font-family:sans-serif;padding:1rem">日付を設定してください</p>';return;}
  const{pos}=CD;
  const ac={conj:'#b8860b',trine:'#005a30',sext:'#004a90',sq:'#8a0000',opp:'#7a3800'};
  const items=[];
  PLANETS.forEach(tpl=>PLANETS.forEach(npl=>{
    const asp=getAspect(tp[tpl],pos[npl]);
    if(asp){
      const orbN=parseFloat(asp.orb);
      const score=calcTransitScore(tpl,npl,asp,orbN);
      const interp=getTransitInterp(tpl,npl,asp);
      items.push({tpl,npl,asp,orbN,score,interp});
    }
  }));
  const list=document.getElementById('transitList');
  if(!items.length){list.innerHTML='<p style="color:var(--muted);font-size:12px;font-family:sans-serif;text-align:center;padding:2rem">有効なトランジットなし</p>';return;}

  const byScore=[...items].sort((a,b)=>b.score-a.score);
  const byOrb=[...items].sort((a,b)=>a.orbN-b.orbN);
  const maxScore=byScore[0].score;

  // TOP5
  let top5=`<div class="transit-top5"><div class="transit-top5-title">✦ 最重要トランジット TOP5</div>`;
  byScore.slice(0,5).forEach(({tpl,npl,asp,interp},i)=>{
    top5+=`<div class="top5-item">
      <div class="top5-rank">${i+1}</div>
      <div style="flex:1;min-width:0">
        <div class="top5-label">T:${PNAMES[tpl]} ${asp.sym} N:${PNAMES[npl]}</div>
        <div class="top5-interp">${interp}</div>
      </div>
      <div class="top5-orb">orb ${asp.orb}°</div>
    </div>`;
  });
  top5+='</div>';

  // 全リスト（オーブ順）
  const listHtml=byOrb.slice(0,25).map(({tpl,npl,asp,score,interp})=>{
    const sd=degToSDD(tp[tpl]);
    const filled=Math.round((score/maxScore)*5);
    const dots=Array.from({length:5},(_,i)=>`<span class="score-dot${i<filled?' filled':''}"></span>`).join('');
    return`<div class="titem">
      <div class="titem-icon" style="color:${ac[asp.cls]||'#333'}">${asp.sym}</div>
      <div style="flex:1;min-width:0">
        <div class="titem-main">T:${PNAMES[tpl]} ${asp.sym} N:${PNAMES[npl]}</div>
        <div class="titem-sub">${SIGNS[sd.si]} ${sd.d}°から / orb ${asp.orb}°</div>
        <div class="titem-interp">${interp}</div>
        <div class="titem-score">${dots}</div>
      </div>
    </div>`;
  }).join('');

  list.innerHTML=top5+`<div style="margin-top:10px"><div style="font-size:9px;letter-spacing:0.15em;color:var(--muted);font-family:sans-serif;text-transform:uppercase;font-weight:700;margin-bottom:6px;">全トランジット一覧（オーブ順）</div>${listHtml}</div>`;
}

(function initTransitDate(){
  const now=new Date();
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  const h=String(now.getHours()).padStart(2,'0'),mi=String(now.getMinutes()).padStart(2,'0');

// === 日付ナビゲーション ===
function shiftDate(days){
  const inp=document.getElementById('transitDate');
  if(!inp.value)return;
  const[y,m,d]=inp.value.split('-').map(Number);
  const dt=new Date(y,m-1,d+days);
  inp.value=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  updateTransit();
}
function shiftMonth(months){
  const inp=document.getElementById('transitDate');
  if(!inp.value)return;
  const[y,m,d]=inp.value.split('-').map(Number);
  const dt=new Date(y,m-1+months,d);
  inp.value=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  updateTransit();
}
function shiftYear(years){
  const inp=document.getElementById('transitDate');
  if(!inp.value)return;
  const[y,m,d]=inp.value.split('-').map(Number);
  const dt=new Date(y+years,m-1,d);
  inp.value=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  updateTransit();
}
document.getElementById('navDayMinus').addEventListener('click',()=>shiftDate(-1));
document.getElementById('navWeekMinus').addEventListener('click',()=>shiftDate(-7));
document.getElementById('navMonthMinus').addEventListener('click',()=>shiftMonth(-1));
document.getElementById('navYearMinus').addEventListener('click',()=>shiftYear(-1));
document.getElementById('navDayPlus').addEventListener('click',()=>shiftDate(1));
document.getElementById('navWeekPlus').addEventListener('click',()=>shiftDate(7));
document.getElementById('navMonthPlus').addEventListener('click',()=>shiftMonth(1));
document.getElementById('navYearPlus').addEventListener('click',()=>shiftYear(1));

// === 月間タイムライン ===
(function initTimeline(){
  const now=new Date();
  document.getElementById('timelineMonth').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
})();

function renderTimeline(){
  if(!CD){alert('先にチャートを生成してください');return;}
  const monthStr=document.getElementById('timelineMonth').value;
  if(!monthStr)return;
  const[year,month]=monthStr.split('-').map(Number);
  const daysInMonth=new Date(year,month,0).getDate();
  const items=[];
  for(let day=1;day<=daysInMonth;day++){
    const jd=toJD(year,month,day,12,0,9);
    const tp={};PLANETS.forEach(p=>tp[p]=calcPlanet(p,jd));
    let totalScore=0;
    const aspects=[];
    PLANETS.forEach(tpl=>PLANETS.forEach(npl=>{
      const asp=getAspect(tp[tpl],CD.pos[npl]);
      if(asp){
        const orbN=parseFloat(asp.orb);
        const score=calcTransitScore(tpl,npl,asp,orbN);
        totalScore+=score;
        aspects.push({tpl,npl,asp,score});
      }
    }));
    aspects.sort((a,b)=>b.score-a.score);
    items.push({day,totalScore,top:aspects.slice(0,3)});
  }
  const maxScore=Math.max(...items.map(i=>i.totalScore),1);
  const DOW=['日','月','火','水','木','金','土'];
  const html=items.map(({day,totalScore,top})=>{
    const pct=Math.round((totalScore/maxScore)*100);
    let fav=0,tense=0;
    top.forEach(({asp})=>{if(asp.cls==='trine'||asp.cls==='sext')fav++;else if(asp.cls==='sq'||asp.cls==='opp')tense++;});
    const barColor=fav>tense?'linear-gradient(90deg,#1a4a2a,#2a8050)':tense>fav?'linear-gradient(90deg,#4a1a1a,#8a2a2a)':'linear-gradient(90deg,#1a2a4a,#b8860b)';
    const dotW=DOW[new Date(year,month-1,day).getDay()];
    const isWeekend=[0,6].includes(new Date(year,month-1,day).getDay());
    const topStr=top.map(({tpl,npl,asp})=>`T:${PNAMES[tpl]}${asp.sym}N:${PNAMES[npl]}`).join(' ');
    return`<div class="tl-day" style="${isWeekend?'background:rgba(184,134,11,0.04)':''}">
      <div class="tl-date" style="${isWeekend?'color:var(--gold)':''}">${month}/${day}<span style="font-size:8px;color:var(--muted);margin-left:2px">${dotW}</span></div>
      <div class="tl-bar-wrap"><div class="tl-bar" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="tl-aspects">${topStr}</div>
    </div>`;
  }).join('');
  document.getElementById('timelineList').innerHTML=html;
}
document.getElementById('timelineGenBtn').addEventListener('click',renderTimeline);

// === 日付比較 ===
(function initCompare(){
  const now=new Date();
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  document.getElementById('compareDateA').value=`${y}-${m}-${d}`;
  document.getElementById('compareDateB').value=`${y+1}-${m}-${d}`;
})();

function renderComparison(){
  if(!CD){alert('先にチャートを生成してください');return;}
  const dateA=document.getElementById('compareDateA').value;
  const timeA=document.getElementById('compareTimeA').value||'12:00';
  const dateB=document.getElementById('compareDateB').value;
  const timeB=document.getElementById('compareTimeB').value||'12:00';
  if(!dateA||!dateB){alert('日付A・Bを両方入力してください');return;}

  function getPosForDate(ds,ts){
    const[y,m,d]=ds.split('-').map(Number),[h,mi]=ts.split(':').map(Number);
    const jd=toJD(y,m,d,h,mi,9);
    const p={};PLANETS.forEach(pl=>p[pl]=calcPlanet(pl,jd));
    return p;
  }
  function getTopTransits(tp){
    const items=[];
    PLANETS.forEach(tpl=>PLANETS.forEach(npl=>{
      const asp=getAspect(tp[tpl],CD.pos[npl]);
      if(asp){
        const orbN=parseFloat(asp.orb);
        const score=calcTransitScore(tpl,npl,asp,orbN);
        const interp=getTransitInterp(tpl,npl,asp);
        items.push({tpl,npl,asp,score,interp});
      }
    }));
    return items.sort((a,b)=>b.score-a.score).slice(0,5);
  }

  const posA=getPosForDate(dateA,timeA);
  const posB=getPosForDate(dateB,timeB);
  const topA=getTopTransits(posA);
  const topB=getTopTransits(posB);

  function renderCol(items,dateStr,colClass){
    const label=dateStr.replace(/-/g,'/');
    return`<div class="compare-col ${colClass}">
      <div class="compare-col-header">${label}</div>
      ${items.length?items.map(({tpl,npl,asp,interp},i)=>`
        <div class="compare-item">
          <div class="ci-rank">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div class="ci-label">T:${PNAMES[tpl]} ${asp.sym} N:${PNAMES[npl]}</div>
            <div class="ci-interp">${interp}</div>
            <div class="ci-orb">orb ${asp.orb}°</div>
          </div>
        </div>`).join(''):'<p style="color:var(--muted);font-size:11px;font-family:sans-serif;padding:8px">トランジットなし</p>'}
    </div>`;
  }

  const planetCompHtml=`<div style="margin-top:12px;background:#fff;border:1.5px solid rgba(26,42,74,0.1);border-radius:8px;padding:12px">
    <div class="sec-title" style="margin-bottom:8px">天体位置の比較</div>
    <table class="asp-table"><thead><tr><th>天体</th><th>${dateA.replace(/-/g,'/')}</th><th>${dateB.replace(/-/g,'/')}</th></tr></thead><tbody>
    ${PLANETS.map(p=>{const sA=degToSDD(posA[p]),sB=degToSDD(posB[p]);
      return`<tr><td>${PSYM[p]} ${PNAMES[p]}</td><td>${SIGNS[sA.si]} ${sA.d}°${String(sA.m).padStart(2,'0')}'</td><td>${SIGNS[sB.si]} ${sB.d}°${String(sB.m).padStart(2,'0')}'</td></tr>`;
    }).join('')}
    </tbody></table>
  </div>`;

  document.getElementById('compareResult').innerHTML=`
    <div class="compare-panels">
      ${renderCol(topA,dateA,'compare-col-a')}
      ${renderCol(topB,dateB,'compare-col-b')}
    </div>
    ${planetCompHtml}`;
}
document.getElementById('compareBtn').addEventListener('click',renderComparison);
</script>
